<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enchanter - タスク管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">✦</span>
      <span class="brand-copy">
        <h1>Enchanter</h1>
        <span class="brand-tagline">タスクと時間を整える</span>
      </span>
    </div>
    <div id="running-box" class="running-box"></div>
    <nav class="tabs" aria-label="メインナビゲーション">
      <button type="button" class="tab-btn" data-action="tab" data-tab="todo" aria-current="page"><span class="tab-icon" aria-hidden="true">✓</span>Todo</button>
      <button type="button" class="tab-btn" data-action="tab" data-tab="kanban"><span class="tab-icon" aria-hidden="true">▦</span>カンバン</button>
      <button type="button" class="tab-btn" data-action="tab" data-tab="timeline"><span class="tab-icon" aria-hidden="true">◷</span>タイムライン</button>
      <button type="button" class="tab-btn" data-action="tab" data-tab="gantt"><span class="tab-icon" aria-hidden="true">≋</span>ガント</button>
      <button type="button" class="tab-btn" data-action="tab" data-tab="report"><span class="tab-icon" aria-hidden="true">◔</span>集計</button>
      <button type="button" class="tab-btn" data-action="tab" data-tab="manage"><span class="tab-icon" aria-hidden="true">⚙</span>管理</button>
    </nav>
  </header>
  <main id="view" class="view"></main>
  <script src="app.js"></script>
</body>
</html>
